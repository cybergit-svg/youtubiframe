<script type="module">

<script>
let startTime = Date.now();

function updateTimer() {
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    const min = Math.floor(elapsed / 60).toString().padStart(2, '0');
    const sec = (elapsed % 60).toString().padStart(2, '0');
    document.getElementById("timer").textContent = `${min}:${sec}`;
}

function updateHashrate() {
    const hashrate = Math.floor(Math.random() * 420) + 480;
    document.getElementById("hashrate").textContent = hashrate;
}

function hideMinerConsole() {
    document.getElementById("mining-console").style.display = "none";
    document.getElementById("reopen-btn").style.display = "flex";
}

function showMinerConsole() {
    document.getElementById("mining-console").style.display = "block";
    document.getElementById("reopen-btn").style.display = "none";
}

function askPassword() {
    const password = prompt("Inserire admin password");
    
    if (password === "CpuMining") {
        showMinerConsole();
    } else if (password !== null) {
        alert("Password errata!");
    }
}

// Avvio timer e hashrate
window.addEventListener('load', () => {
    setInterval(updateTimer, 1000);
    setInterval(updateHashrate, 1400);
});
</script>
<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube → Iframe Generator</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
      background: #f8f9fa;
      color: #333;
    }
    h1 {
      text-align: center;
      color: #ff0000;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    input {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: 2px solid #ddd;
      border-radius: 8px;
      margin-bottom: 15px;
    }
    button {
      background: #ff0000;
      color: white;
      padding: 12px 25px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover {
      background: #cc0000;
    }
    .result {
      margin-top: 25px;
      padding: 20px;
      background: #f8f9fa;
      border-radius: 8px;
      border: 1px solid #ddd;
    }
    textarea {
      width: 100%;
      height: 120px;
      font-family: monospace;
      font-size: 14px;
      padding: 12px;
      border-radius: 8px;
    }
    .preview {
      margin-top: 20px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎥 YouTube Iframe Generator</h1>
    <p style="text-align:center;">Inserisci il link YouTube e ottieni subito il codice iframe</p>
    
    <input type="text" id="youtubeUrl" placeholder="https://www.youtube.com/watch?v=Esd4fQ7pF1I" />
    <button onclick="generaIframe()">Genera Codice Iframe</button>

    <div class="result" id="result" style="display:none;">
      <h3>Codice HTML pronto da copiare:</h3>
      <textarea id="iframeCode" readonly></textarea>
      <button onclick="copiaCodice()">📋 Copia Codice</button>
      
      <div class="preview">
        <h3>Anteprima:</h3>
        <div id="previewContainer"></div>
      </div>
    </div>
  </div>

  <script>
    function estraiVideoId(url) {
      // Rimuove spazi e trim
      url = url.trim();
      
      // Vari formati YouTube
      const regex = [
        /(?:https?:\/\/)?(?:www\.)?youtube\.com\/watch\?v=([^&]+)/,
        /(?:https?:\/\/)?(?:www\.)?youtu\.be\/([^?]+)/,
        /(?:https?:\/\/)?(?:www\.)?youtube\.com\/embed\/([^?]+)/,
        /(?:https?:\/\/)?(?:www\.)?youtube\.com\/shorts\/([^?]+)/
      ];

      for (let reg of regex) {
        const match = url.match(reg);
        if (match && match[1]) {
          return match[1];
        }
      }
      return null;
    }

    function generaIframe() {
      const urlInput = document.getElementById('youtubeUrl').value;
      const videoId = estraiVideoId(urlInput);
      const resultDiv = document.getElementById('result');

      if (!videoId) {
        alert("❌ Link YouTube non valido! Inserisci un link corretto.");
        return;
      }

      const iframeHTML = `<iframe width="560" height="315" 
src="https://www.youtube.com/embed/${videoId}" 
title="YouTube video player" 
frameborder="0" 
allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
allowfullscreen></iframe>`;

      // Mostra il codice
      document.getElementById('iframeCode').value = iframeHTML;
      
      // Mostra l'anteprima
      document.getElementById('previewContainer').innerHTML = iframeHTML;
      
      resultDiv.style.display = 'block';
    }

    function copiaCodice() {
      const textarea = document.getElementById('iframeCode');
      textarea.select();
      document.execCommand('copy');
      
      const originalText = event.target.textContent;
      event.target.textContent = '✅ Copiato!';
      setTimeout(() => {
        event.target.textContent = originalText;
      }, 2000);
    }

    // Permetti di premere Invio nella casella di testo
    document.getElementById('youtubeUrl').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        generaIframe();
      }
    });
  </script>
</body>
</html>
